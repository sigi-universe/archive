name: JetEngine Sync Debug

on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyYAML requests

      - name: Fetch and Convert
        env:
          WP_USER: ${{ secrets.WP_USERNAME }}
          WP_PASS: ${{ secrets.WP_PASSWORD }}
        run: |
          python - <<EOF
          import requests
          import yaml
          import os

          url = "https://sigi-universe.com/wp-json/wp/v2/posts"
          user = os.getenv('WP_USER')
          pw = os.getenv('WP_PASS')

          print(f"Attempting to connect to: {url}")
          print(f"User check: {'OK' if user else 'MISSING'}")
          print(f"Password check: {'OK' if pw else 'MISSING'}")

          try:
              response = requests.get(url, auth=(user, pw))
              print(f"Status Code: {response.status_code}")
              
              if response.status_code == 401:
                  print("Error: ログインに失敗しました。パスワードかユーザー名が違います。")
              elif response.status_code == 404:
                  print("Error: URLが間違っているか、REST APIが無効です。")
              
              response.raise_for_status()
              posts = response.json()

              if not os.path.exists('content'):
                  os.makedirs('content')

              for post in posts:
                  file_name = f"content/post-{post['id']}.yaml"
                  with open(file_name, 'w', encoding='utf-8') as f:
                      yaml.dump(post, f, allow_unicode=True, sort_keys=False)
              print("Done!")
          except Exception as e:
              print(f"Detailed Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/*.yaml
          git commit -m "Update post data to YAML" || echo "No changes to commit"
          git push
