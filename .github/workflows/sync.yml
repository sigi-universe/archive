name: JetEngine Sync Final

on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyYAML requests

      - name: Fetch and Convert
        env:
          WP_USER: ${{ secrets.WP_USERNAME }}
          WP_PASS: ${{ secrets.WP_PASSWORD }}
        run: |
          python - <<EOF
          import requests
          import yaml
          import os

          url = "https://sigi-universe.com/wp-json/wp/v2/posts"
          # ブラウザのふりをするための設定
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
          }
          auth = (os.getenv('WP_USER'), os.getenv('WP_PASS'))

          try:
              # headersを追加してリクエスト
              response = requests.get(url, auth=auth, headers=headers)
              print(f"Status Code: {response.status_code}")
              
              response.raise_for_status()
              posts = response.json()

              if not os.path.exists('content'):
                  os.makedirs('content')

              for post in posts:
                  file_name = f"content/post-{post['id']}.yaml"
                  with open(file_name, 'w', encoding='utf-8') as f:
                      yaml.dump(post, f, allow_unicode=True, sort_keys=False)
              print("Success!")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/*.yaml
          git commit -m "Update post data to YAML" || echo "No changes to commit"
          git push
