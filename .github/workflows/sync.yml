name: JetEngine Structured Sync

on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyYAML requests

      - name: Fetch and Convert
        env:
          WP_USER: ${{ secrets.WP_USERNAME }}
          WP_PASS: ${{ secrets.WP_PASSWORD }}
        run: |
          python - <<EOF
          import requests
          import yaml
          import os

          # 成功した実績のあるURLを使用
          url = "https://sigi-universe.com/wp-json/wp/v2/posts?_embed"
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
          }
          auth = (os.getenv('WP_USER'), os.getenv('WP_PASS'))

          try:
              response = requests.get(url, auth=auth, headers=headers)
              response.raise_for_status()
              posts = response.json()

              if not os.path.exists('content'):
                  os.makedirs('content')

              for post in posts:
                  # データの整理（.get()を使うことで、項目がなくてもエラーにならないようにします）
                  structured = {
                      'title': post.get('title', {}).get('rendered', ''),
                      'slug': post.get('slug', str(post.get('id'))),
                      'hierarchy': post.get('id_hierarchy'),
                      'unique_tag': post.get('id_uniquetag'),
                      'start_year': post.get('id_startyear'),
                      'end_year': post.get('endyear'),
                      # 画像にあった「the_rule_constraints」などをそのまま抽出
                      'constraints': post.get('the_rule_constraints', []),
                      # 全データも念のため残す（不要ならここを消すとスッキリします）
                      'raw_data': post 
                  }

                  file_name = f"content/{structured['slug']}.yaml"
                  with open(file_name, 'w', encoding='utf-8') as f:
                      # 日本語が文字化けしない設定
                      yaml.dump(structured, f, allow_unicode=True, sort_keys=False)
              
              print("Conversion successful.")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/*.yaml
          git commit -m "Update post data safely" || echo "No changes to commit"
          git push
