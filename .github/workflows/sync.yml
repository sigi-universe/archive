name: JetEngine Relation Sync

on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyYAML requests

      - name: Fetch JetEngine Relations
        env:
          WP_USER: ${{ secrets.WP_USERNAME }}
          WP_PASS: ${{ secrets.WP_PASSWORD }}
        run: |
          python - <<EOF
          import requests
          import yaml
          import os

          # ここに JetEngine の Relation を含む投稿データを取りに行きます
          url = "https://sigi-universe.com/wp-json/wp/v2/posts"
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
          }
          auth = (os.getenv('WP_USER'), os.getenv('WP_PASS'))

          try:
              # _embed を追加することで、関連データ（Relation）が含まれやすくなります
              response = requests.get(url + "?_embed", auth=auth, headers=headers)
              response.raise_for_status()
              posts = response.json()

              if not os.path.exists('content'):
                  os.makedirs('content')

              for post in posts:
                  # ファイル名は記事のスラッグ（URLの一部）を使用
                  slug = post.get('slug', str(post['id']))
                  file_name = f"content/{slug}.yaml"
                  
                  # 保存するデータを選別（不要な HTML 等を削ることも可能）
                  with open(file_name, 'w', encoding='utf-8') as f:
                      yaml.dump(post, f, allow_unicode=True, sort_keys=False)
              print("YAML conversion successful.")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/*.yaml
          git commit -m "Update post relations to YAML" || echo "No changes to commit"
          git push
