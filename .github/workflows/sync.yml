name: JetEngine Metasheet Sync

on:
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyYAML requests

      - name: Fetch and Structure Data
        env:
          WP_USER: ${{ secrets.WP_USERNAME }}
          WP_PASS: ${{ secrets.WP_PASSWORD }}
        run: |
          python - <<EOF
          import requests
          import yaml
          import os

          # 設定
          SITE_URL = "https://sigi-universe.com"
          # metasheet という投稿タイプを対象に、関連データ（_embed）を含めて取得
          API_URL = f"{SITE_URL}/wp-json/wp/v2/metasheet?_embed&per_page=100"
          AUTH = (os.getenv('WP_USER'), os.getenv('WP_PASS'))
          HEADERS = {'User-Agent': 'Mozilla/5.0'}

          try:
              response = requests.get(API_URL, auth=AUTH, headers=HEADERS)
              response.raise_for_status()
              posts = response.json()

              if not os.path.exists('content'):
                  os.makedirs('content')

              for post in posts:
                  # データの整形開始
                  structured_data = {
                      'title': post['title']['rendered'],
                      'slug': post['slug'],
                      'id_hierarchy': post.get('id_hierarchy'),
                      'id_uniquetag': post.get('id_uniquetag'),
                      'year_range': {
                          'start': post.get('id_startyear'),
                          'end': post.get('endyear')
                      },
                      # WikiCat タクソノミーの抽出
                      'categories': [term['name'] for term in post.get('_embedded', {}).get('wp:term', [[]])[0]],
                      # メタフィールド（ルール・制約など）
                      'constraints': post.get('the_rule_constraints', []),
                      # リレーション（※APIに露出している場合）
                      'relations': {
                          'spatial_anchor': post.get('spatial_anchor_ids', []),
                          'dependencies_parent': post.get('dependencies_parent_ids', [])
                      }
                  }

                  file_name = f"content/{post['slug']}.yaml"
                  with open(file_name, 'w', encoding='utf-8') as f:
                      # 読みやすく、日本語もそのまま表示されるように書き出し
                      yaml.dump(structured_data, f, allow_unicode=True, sort_keys=False, default_flow_style=False)
              
              print(f"Successfully synced {len(posts)} items.")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/*.yaml
          git commit -m "Update formatted metasheet data" || echo "No changes to commit"
          git push
